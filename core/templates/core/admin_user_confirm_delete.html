{% extends "base.html" %}
{% block title %}Delete User — TaskPortal{% endblock %}

{% block content %}
<div class="py-4">
    <div class="card glass-card border-0" style="max-width: 500px; margin: 0 auto;">
        <div class="card-body p-4 text-center">
            <i class="bi bi-exclamation-triangle-fill text-danger display-3 mb-3"></i>
            <h3 class="fw-bold">Delete User</h3>
            <p class="text-muted">Are you sure you want to delete the user:</p>
            <h5 class="fw-semibold text-accent mb-4">"{{ target_user.username }}" ({{ target_user.get_role_display }})</h5>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i> Delete</button>
                    <a href="{% url 'admin_user_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
